---
# Application configuration
app_name: devops-app
docker_image: ramzeus1/devops-info-service
docker_tag: latest

# Ports
app_host_port: 5000
app_container_port: 5000

# Docker Compose
compose_project_dir: "/opt/{{ app_name }}"
docker_compose_version: "3.8"

# Health check
health_check_retries: 30
health_check_delay: 5

# Container settings
restart_policy: unless-stopped
app_env:
  HOST: "0.0.0.0"
  PORT: "5000"

# Wipe Logic Control
web_app_wipe: false
